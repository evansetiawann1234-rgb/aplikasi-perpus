<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perpustakaan SMK 1 gedong tataan</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    form {
      display: grid;
      gap: 10px;
    }

    form input, form button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #4facfe;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #007bff;
    }

    .edit-mode {
      background: orange !important;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    table th, table td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    table img {
      width: 60px;
      border-radius: 6px;
    }

    .delete-btn {
      background: red;
      padding: 5px 10px;
      border-radius: 6px;
    }

    .edit-btn {
      background: orange;
      padding: 5px 10px;
      border-radius: 6px;
      margin-right: 5px;
    }

    @media (max-width: 600px) {
      table th, table td {
        font-size: 12px;
        padding: 5px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📚 Perpustakaan SMK 1 gedong tatan</h1>

  <!-- FORM -->
  <div class="card">
    <h2>Input Data Buku</h2>
    <form id="bookForm">
      <input type="text" id="judul" placeholder="Judul Buku" required>
      <input type="text" id="penerbit" placeholder="Nama Penerbit" required>
      <input type="number" id="tahun" placeholder="Tahun Terbit" required>
      <input type="number" id="stok" placeholder="Stok Buku" required>
      <input type="file" id="sampul" accept="image/*">
      <button type="submit" id="submitBtn">Tambah Buku</button>
    </form>
  </div>

  <!-- TABEL -->
  <div class="card">
    <h2>Laporan Buku</h2>
    <table>
      <thead>
        <tr>
          <th>Sampul</th>
          <th>Judul</th>
          <th>Penerbit</th>
          <th>Tahun</th>
          <th>Stok</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="bookTable"></tbody>
    </table>
  </div>
</div>

<script>
  const form = document.getElementById("bookForm");
  const table = document.getElementById("bookTable");
  const submitBtn = document.getElementById("submitBtn");

  let books = [];
  let editIndex = -1;

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const judul = document.getElementById("judul").value;
    const penerbit = document.getElementById("penerbit").value;
    const tahun = document.getElementById("tahun").value;
    const stok = document.getElementById("stok").value;
    const file = document.getElementById("sampul").files[0];

    if (file) {
      const reader = new FileReader();
      reader.onload = function() {
        simpanData(judul, penerbit, tahun, stok, reader.result);
      };
      reader.readAsDataURL(file);
    } else {
      const sampul = editIndex !== -1 ? books[editIndex].sampul : "";
      simpanData(judul, penerbit, tahun, stok, sampul);
    }
  });

  function simpanData(judul, penerbit, tahun, stok, sampul) {
    const data = { judul, penerbit, tahun, stok, sampul };

    if (editIndex === -1) {
      books.push(data);
    } else {
      books[editIndex] = data;
      editIndex = -1;
      submitBtn.textContent = "Tambah Buku";
      submitBtn.classList.remove("edit-mode");
    }

    form.reset();
    renderTable();
  }

  function renderTable() {
    table.innerHTML = "";

    books.forEach((buku, index) => {
      table.innerHTML += `
        <tr>
          <td>${buku.sampul ? `<img src="${buku.sampul}">` : "-"}</td>
          <td>${buku.judul}</td>
          <td>${buku.penerbit}</td>
          <td>${buku.tahun}</td>
          <td>${buku.stok}</td>
          <td>
            <button class="edit-btn" onclick="editData(${index})">Edit</button>
            <button class="delete-btn" onclick="hapus(${index})">Hapus</button>
          </td>
        </tr>
      `;
    });
  }

  function hapus(index) {
    if (confirm("Yakin ingin menghapus data?")) {
      books.splice(index, 1);
      renderTable();
    }
  }

  function editData(index) {
    const buku = books[index];

    document.getElementById("judul").value = buku.judul;
    document.getElementById("penerbit").value = buku.penerbit;
    document.getElementById("tahun").value = buku.tahun;
    document.getElementById("stok").value = buku.stok;

    editIndex = index;
    submitBtn.textContent = "Update Buku";
    submitBtn.classList.add("edit-mode");
  }
</script>

</body>
</html>
